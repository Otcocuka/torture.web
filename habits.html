<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер привычек (Refactored)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animation Utils */
        @keyframes fade-in { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
        .transition-standard { transition: all 0.2s ease-in-out; }
        
        /* Modal Transitions */
        .modal-hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .modal-visible { opacity: 1; pointer-events: auto; transform: scale(1); }
        
        /* Layout Helpers */
        body { background-color: #f9fafb; min-height: 100vh; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <!-- Header & Input -->
        <div class="bg-white p-6 rounded-lg shadow-sm">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Мои Привычки</h1>
            <form id="habitForm" class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="habitInput" placeholder="Новая привычка..."
                        class="w-full p-2 pr-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <!-- Кнопка настроек -->
                    <button type="button" id="openSettingsBtn" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-500" title="Настройки">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                </div>
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-standard">Добавить</button>
            </form>
        </div>

        <!-- Habits List -->
        <div id="habitsContainer" class="space-y-4">
            <!-- Rendered via JS -->
        </div>

    </div>

    <!-- Global Modals Container -->
    <div id="modalsContainer"></div>

    <!-- Floating Action Buttons -->
    <div class="fixed bottom-6 right-6 flex flex-col gap-3">
        <button id="openAchievementsBtn" class="bg-green-500 text-white w-12 h-12 rounded-full shadow-lg hover:bg-green-600 transition-standard flex items-center justify-center" title="Достижения">
            🏆
        </button>
    </div>

    <script>
        /**
         * ------------------------------------------------------------------
         * 1. STATE MANAGEMENT
         * ------------------------------------------------------------------
         */
        const Store = {
            key: 'habits_v2_data',
            data: {
                habits: [],
                achievements: [],
                settings: { goal: 5, color: 'blue' }
            },

            load() {
                const raw = localStorage.getItem(this.key);
                if (raw) {
                    try {
                        const parsed = JSON.parse(raw);
                        // Merge with defaults to prevent crash on schema changes
                        this.data = { ...this.data, ...parsed, settings: { ...this.data.settings, ...parsed.settings } };
                    } catch (e) { console.error("Data corruption", e); }
                }
            },

            save() {
                localStorage.setItem(this.key, JSON.stringify(this.data));
            },

            // Habit Actions
            addHabit(name, subtasks) {
                const habit = {
                    id: Date.now(),
                    name,
                    count: 0,
                    goal: this.data.settings.goal,
                    color: this.data.settings.color,
                    subtasks: subtasks.map(st => ({ ...st, dates: [] })), // Persist subtasks
                    history: []
                };
                this.data.habits.push(habit);
                this.save();
                return habit;
            },

            deleteHabit(id) {
                this.data.habits = this.data.habits.filter(h => h.id !== id);
                this.save();
            },

            incrementHabit(id) {
                const habit = this.data.habits.find(h => h.id === id);
                if (!habit) return;

                const today = new Date().toISOString().split('T')[0];
                habit.count++;

                // 1. Log History
                const completedSubtaskIds = habit.subtasks.filter(st => st.completed).map(st => st.id);
                habit.history.push({ date: today, subtasks: completedSubtaskIds });

                // 2. Update Subtask Dates & Reset State
                habit.subtasks.forEach(st => {
                    if (st.completed) {
                        st.dates = st.dates || [];
                        st.dates.push(today);
                        st.completed = false; // Reset checkbox
                    }
                });

                // 3. Check Achievement
                if (habit.count >= habit.goal) {
                    const exists = this.data.achievements.some(a => a.name === habit.name && a.goal === habit.goal);
                    if (!exists) {
                        this.data.achievements.push({ name: habit.name, goal: habit.goal, date: today });
                        this.save(); // Save before triggering UI
                        UI.showNotification(`🏆 Ачивка! ${habit.name} x${habit.goal}`);
                    }
                }

                this.save();
            },

            toggleSubtask(habitId, subtaskId, status) {
                const habit = this.data.habits.find(h => h.id === habitId);
                if (!habit) return;
                const subtask = habit.subtasks.find(s => s.id === subtaskId);
                if (subtask) {
                    subtask.completed = status;
                    this.save();
                }
            },

            // Settings
            updateSettings(goal, color) {
                this.data.settings = { goal: parseInt(goal) || 5, color };
                // Update settings for existing habits? No, keep only for new ones per original logic.
                this.save();
            },

            // Subtasks Management (Temporary during creation)
            getTempSubtasks() {
                return this._tempSubtasks || [];
            },
            addTempSubtask(text) {
                if (!this._tempSubtasks) this._tempSubtasks = [];
                this._tempSubtasks.push({ id: Date.now(), text, completed: false });
            },
            removeTempSubtask(id) {
                this._tempSubtasks = this._tempSubtasks.filter(s => s.id !== id);
            },
            clearTempSubtasks() {
                this._tempSubtasks = [];
            }
        };

        /**
         * ------------------------------------------------------------------
         * 2. UI HELPERS & RENDERERS
         * ------------------------------------------------------------------
         */
        const UI = {
            elements: {
                form: document.getElementById('habitForm'),
                input: document.getElementById('habitInput'),
                container: document.getElementById('habitsContainer'),
                modals: document.getElementById('modalsContainer')
            },

            // Grammar Utils
            getDayWord: (count) => {
                if (count % 10 === 1 && count % 100 !== 11) return 'день';
                if ([2, 3, 4].includes(count % 10) && ![12, 13, 14].includes(count % 100)) return 'дня';
                return 'дней';
            },
            formatDate: (str) => new Date(str).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }),

            // Main Render
            renderHabits() {
                const habits = Store.data.habits;
                this.elements.container.innerHTML = habits.length === 0 
                    ? `<div class="text-center text-gray-500 py-8">Пока пусто. Добавьте привычку!</div>`
                    : habits.map(h => this.habitCardHTML(h)).join('');
            },

            habitCardHTML(habit) {
                const color = habit.color || 'blue';
                const lightColor = { blue: 'bg-blue-100', green: 'bg-green-100', purple: 'bg-purple-100' }[color];
                const textColor = { blue: 'text-blue-800', green: 'text-green-800', purple: 'text-purple-800' }[color];

                return `
                    <div class="bg-white p-4 rounded-lg shadow-sm transition-standard hover:shadow-md relative overflow-hidden border-l-4 border-${color}-500" data-id="${habit.id}">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-lg font-medium text-gray-800">${habit.name}</h3>
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-semibold text-gray-600 bg-gray-100 px-2 py-1 rounded">${habit.count} ${this.getDayWord(habit.count)}</span>
                                <button class="delete-btn text-gray-300 hover:text-red-500 transition-standard" data-id="${habit.id}">
                                    &times;
                                </button>
                            </div>
                        </div>

                        <!-- Subtasks List -->
                        ${habit.subtasks?.length ? `
                            <div class="ml-2 mt-2 space-y-2 mb-3 border-l-2 border-gray-100 pl-3">
                                ${habit.subtasks.map(st => `
                                    <div class="flex items-center gap-2 group">
                                        <input type="checkbox" 
                                            class="form-checkbox rounded text-${color}-500 focus:ring-${color}-500 cursor-pointer"
                                            ${st.completed ? 'checked' : ''}
                                            data-action="toggle-subtask"
                                            data-habit-id="${habit.id}"
                                            data-subtask-id="${st.id}">
                                        <span class="text-sm ${st.completed ? 'line-through text-gray-400' : 'text-gray-700'} group-hover:text-gray-900">
                                            ${st.text}
                                            <small class="ml-2 text-gray-400 text-xs">(${st.dates?.length || 0})</small>
                                        </span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}

                        <div class="flex items-center justify-between mt-2">
                            <button data-action="increment" data-id="${habit.id}" 
                                class="${lightColor} ${textColor} px-3 py-1.5 rounded-md text-sm font-medium hover:brightness-95 transition-standard">
                                Отметить день
                            </button>
                            ${this.renderHistoryPreview(habit)}
                        </div>
                    </div>
                `;
            },

            renderHistoryPreview(habit) {
                if (!habit.history?.length) return '';
                const last = habit.history[habit.history.length - 1];
                return `
                    <details class="text-xs text-gray-500 ml-auto">
                        <summary class="cursor-pointer hover:text-blue-500">История</summary>
                        <div class="mt-2 bg-gray-50 p-2 rounded space-y-1 text-[10px]">
                            ${habit.history.slice(-5).reverse().map(h => `
                                <div><b>${this.formatDate(h.date)}:</b> ${h.subtasks.length ? h.subtasks.length + ' шт.' : 'без подп.'}</div>
                            `).join('')}
                        </div>
                    </details>
                `;
            },

            renderTempSubtasks() {
                const container = document.getElementById('tempSubtasksContainer');
                if (!container) return;
                const subtasks = Store.getTempSubtasks();
                container.innerHTML = subtasks.map(st => `
                    <div class="flex items-center gap-2 text-sm bg-gray-50 p-2 rounded">
                        <span class="flex-1 truncate">${st.text}</span>
                        <button class="text-red-500 font-bold remove-subtask" data-id="${st.id}">&times;</button>
                    </div>
                `).join('');
            },

            // Notifications
            showNotification(msg) {
                const notif = document.createElement('div');
                notif.className = 'fixed top-4 right-4 bg-green-100 text-green-800 px-4 py-2 rounded-lg shadow-lg animate-fade-in z-50 cursor-pointer';
                notif.textContent = msg;
                notif.onclick = () => notif.remove();
                document.body.appendChild(notif);
                setTimeout(() => notif.remove(), 4000);
            },

            // Confirm Modal
            showConfirmDelete(id, onConfirm) {
                this.renderModal('confirmModal', `
                    <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-xl transform transition-all scale-100">
                        <h3 class="text-lg font-bold mb-2">Удалить привычку?</h3>
                        <p class="text-gray-600 mb-6">Это действие нельзя отменить.</p>
                        <div class="flex justify-end gap-2">
                            <button data-close-modal class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Отмена</button>
                            <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">Удалить</button>
                        </div>
                    </div>
                `, true);

                document.getElementById('confirmDeleteBtn').onclick = () => {
                    onConfirm();
                    this.closeModal('confirmModal');
                };
            },

            // Settings Modal
            showSettingsModal() {
                const settings = Store.data.settings;
                this.renderModal('settingsModal', `
                    <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-xl">
                        <h3 class="text-xl font-bold mb-4">Настройки</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Цель (раз/день)</label>
                                <input type="number" id="settingsGoal" min="1" value="${settings.goal}" class="w-full p-2 border rounded">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Цвет</label>
                                <select id="settingsColor" class="w-full p-2 border rounded">
                                    <option value="blue" ${settings.color === 'blue' ? 'selected' : ''}>Синий</option>
                                    <option value="green" ${settings.color === 'green' ? 'selected' : ''}>Зеленый</option>
                                    <option value="purple" ${settings.color === 'purple' ? 'selected' : ''}>Фиолетовый</option>
                                </select>
                            </div>
                            <div class="border-t pt-4">
                                <label class="block text-sm font-medium mb-1">Подпункты (временные)</label>
                                <div id="tempSubtasksContainer" class="space-y-2 mb-2 max-h-24 overflow-y-auto"></div>
                                <div class="flex gap-2">
                                    <input type="text" id="tempSubtaskInput" placeholder="Новый подпункт..." class="flex-1 p-2 border rounded text-sm">
                                    <button type="button" id="addTempSubtaskBtn" class="bg-gray-200 px-3 rounded hover:bg-gray-300">+</button>
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 flex justify-end gap-2">
                            <button data-close-modal class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Отмена</button>
                            <button id="saveSettingsBtn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Сохранить</button>
                        </div>
                    </div>
                `, true);

                // Bind temp subtask logic
                this.renderTempSubtasks();
                document.getElementById('addTempSubtaskBtn').onclick = () => {
                    const input = document.getElementById('tempSubtaskInput');
                    if (input.value.trim()) {
                        Store.addTempSubtask(input.value.trim());
                        input.value = '';
                        this.renderTempSubtasks();
                    }
                };
                document.getElementById('tempSubtasksContainer').onclick = (e) => {
                    if (e.target.classList.contains('remove-subtask')) {
                        Store.removeTempSubtask(parseInt(e.target.dataset.id));
                        this.renderTempSubtasks();
                    }
                };

                // Save
                document.getElementById('saveSettingsBtn').onclick = () => {
                    const goal = document.getElementById('settingsGoal').value;
                    const color = document.getElementById('settingsColor').value;
                    Store.updateSettings(goal, color);
                    this.closeModal('settingsModal');
                    Store.clearTempSubtasks(); // Clear temp data on save
                    this.showNotification('Настройки сохранены');
                };
            },

            // Achievements Modal
            showAchievementsModal() {
                const list = Store.data.achievements;
                const content = list.length === 0 
                    ? '<div class="text-gray-500 text-center py-4">Нет достижений</div>'
                    : list.map(a => `
                        <div class="bg-green-50 border border-green-100 p-3 rounded flex justify-between items-center">
                            <span><span class="mr-2">🏆</span>${a.name}</span>
                            <span class="text-xs text-green-600 font-bold">x${a.goal}</span>
                        </div>
                    `).join('');

                this.renderModal('achievementsModal', `
                    <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-xl flex flex-col max-h-[80vh]">
                        <h3 class="text-xl font-bold mb-4">Достижения</h3>
                        <div class="flex-1 overflow-y-auto space-y-2 pr-1">${content}</div>
                        <div class="mt-4 pt-4 border-t flex justify-end">
                            <button data-close-modal class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded">Закрыть</button>
                        </div>
                    </div>
                `, true);
            },

            // Modal System
            renderModal(id, html, isOverlay = false) {
                let modal = document.getElementById(id);
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = id;
                    modal.className = `fixed inset-0 z-40 flex items-center justify-center p-4 bg-black/50 transition-all duration-200 ${isOverlay ? 'modal-hidden' : ''}`;
                    // Click outside to close
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) this.closeModal(id);
                    });
                    this.elements.modals.appendChild(modal);
                }
                modal.innerHTML = html;
                // Bind generic close buttons
                modal.querySelectorAll('[data-close-modal]').forEach(btn => {
                    btn.addEventListener('click', () => this.closeModal(id));
                });
                
                requestAnimationFrame(() => {
                    modal.classList.remove('modal-hidden');
                    modal.classList.add('modal-visible');
                });
            },

            closeModal(id) {
                const modal = document.getElementById(id);
                if (modal) {
                    modal.classList.remove('modal-visible');
                    modal.classList.add('modal-hidden');
                    setTimeout(() => modal.remove(), 200);
                }
            }
        };

        /**
         * ------------------------------------------------------------------
         * 3. APP CONTROLLER (Event Listeners & Init)
         * ------------------------------------------------------------------
         */
        const App = {
            init() {
                Store.load();
                UI.renderHabits();

                // 1. Add Habit Form
                UI.elements.form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = UI.elements.input.value.trim();
                    if (!name) return;

                    const subtasks = Store.getTempSubtasks();
                    Store.addHabit(name, subtasks);
                    Store.clearTempSubtasks();
                    
                    UI.elements.input.value = '';
                    UI.renderHabits();
                    UI.showNotification('Привычка добавлена!');
                });

                // 2. Main Container Delegation (Increments, Deletes, Subtasks)
                UI.elements.container.addEventListener('click', (e) => {
                    const target = e.target.closest('button');
                    if (!target) return;

                    const id = parseInt(target.dataset.id);
                    const action = target.dataset.action;

                    // Delete
                    if (target.classList.contains('delete-btn')) {
                        UI.showConfirmDelete(id, () => {
                            Store.deleteHabit(id);
                            UI.renderHabits();
                        });
                    }
                    // Increment
                    else if (action === 'increment') {
                        Store.incrementHabit(id);
                        UI.renderHabits();
                    }
                });

                // 3. Subtask Toggles (Delegation on Change)
                UI.elements.container.addEventListener('change', (e) => {
                    if (e.target.matches('[data-action="toggle-subtask"]')) {
                        const habitId = parseInt(e.target.dataset.habitId);
                        const subtaskId = parseInt(e.target.dataset.subtaskId);
                        Store.toggleSubtask(habitId, subtaskId, e.target.checked);
                        // No need to re-render fully, but good for consistency
                        UI.renderHabits(); 
                    }
                });

                // 4. Settings Modal Trigger
                document.getElementById('openSettingsBtn').addEventListener('click', () => {
                    UI.showSettingsModal();
                });

                // 5. Achievements Modal Trigger
                document.getElementById('openAchievementsBtn').addEventListener('click', () => {
                    UI.showAchievementsModal();
                });
            }
        };

        // Boot
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
